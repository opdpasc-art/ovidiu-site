<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dumitru-Ovidiu Pascu - Tezaur Digital</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Cinzel:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root { --rosu: #C8102E; --albastru: #002366; --aur: #F1C40F; }

        /* INTRO CINEMATIC REGLAT PENTRU POZE DIFERITE */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #intro-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; /* Rezolvă problema dimensiunilor diferite */
            background-position: center;
            opacity: 0.4; z-index: -3;
            filter: grayscale(60%) sepia(30%);
            transition: background-image 0.5s ease;
        }

        /* EFECT DE PELICULĂ VECHE */
        .film-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(90deg, #000 0%, transparent 15%, transparent 85%, #000 100%),
                repeating-linear-gradient(0deg, transparent 0px, transparent 40px, rgba(255,255,255,0.1) 41px);
            z-index: -1; pointer-events: none;
        }

        #intro-year {
            font-size: 7rem; font-weight: bold; color: #f4e4bc;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px #000;
        }

        /* JURĂMÂNT */
        #start-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; color: #d2b48c; text-align: center; font-family: 'Georgia', serif;
        }

        .biblia { width: 300px; height: auto; transition: 0.5s; filter: sepia(0.5); }
        #start-gate:hover .biblia { transform: scale(1.05); filter: sepia(0); box-shadow: 0 0 30px var(--aur); }

        /* CARTE MIORIȚA */
        #opened-book {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ba8c59 url('https://www.transparenttextures.com/patterns/parchment.png');
            display: none; opacity: 0; transition: 1.5s; z-index: 10;
            flex-direction: row; box-shadow: inset 0 0 200px #000;
        }

        .page { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .aromanian { font-family: 'EB Garamond', serif; font-size: 2rem; font-style: italic; color: #2e1a0f; }

        @media (max-width: 768px) {
            #opened-book { flex-direction: column; }
            .aromanian { font-size: 1.2rem; }
            #intro-year { font-size: 4rem; }
        }

        /* SITE */
        body { margin: 0; background: #f9f6f0; font-family: sans-serif; }
        header { text-align: center; padding: 50px; color: var(--rosu); }
    </style>
</head>
<body>

<audio id="audio-fundal" src="muzica_intro.mp3"></audio>

<div id="start-gate" onclick="juraSiPorneste()">
    <h2>JURĂMÂNTUL TRADIȚIEI</h2>
    <p>Atinge Biblia pentru a păstra tezaurul...</p>
    <img src="biblia-veche.jpg" class="biblia">
</div>

<div id="opened-book">
    <div class="page" style="border-right: 1px solid rgba(0,0,0,0.2)">
        <h3 style="font-family: 'Cinzel';">MIORIȚA</h3>
        <p class="aromanian">Pe-un picior de plai,<br>Pe-o gură de rai...</p>
    </div>
    <div class="page">
        <h3 style="font-family: 'Cinzel';">MIORITSEA</h3>
        <p class="aromanian">Pi-un cicioar di plai,<br>Pi-unã gurã di rai...</p>
    </div>
</div>

<div id="intro-screen">
    <div id="intro-bg"></div>
    <div class="film-overlay"></div>
    <div id="intro-year">1600</div>
</div>

<header>
    <h1>DUMITRU-OVIDIU PASCU</h1>
    <p>TRADIȚIE • INOVAȚIE • COVURLUI</p>
</header>

<script>
    const istorieVizuala = {
        1600: 'poza1.jpg', 1700: 'poza2.jpg', 1800: 'poza3.jpg',
        1900: 'poza4.jpg', 2000: 'poza5.jpg', 2026: 'poza6.jpg'
    };

    function juraSiPorneste() {
        document.getElementById('start-gate').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('start-gate').style.display = 'none';
            const book = document.getElementById('opened-book');
            book.style.display = 'flex';
            setTimeout(() => book.style.opacity = '1', 50);

            setTimeout(() => {
                book.style.opacity = '0';
                setTimeout(() => {
                    book.style.display = 'none';
                    pornesteCinema();
                }, 1500);
            }, 10000); // 10 secunde de citit
        }, 1000);
    }

    function pornesteCinema() {
        const intro = document.getElementById('intro-screen');
        const bg = document.getElementById('intro-bg');
        const yr = document.getElementById('intro-year');
        const audio = document.getElementById('audio-fundal');
        
        intro.style.display = 'flex';
        audio.volume = 0.05;
        audio.currentTime = 4;
        audio.play();

        let an = 1600;
        let tinte = [1700, 1800, 1900, 2000, 2026];
        let i = 0;

        bg.style.backgroundImage = `url('${istorieVizuala[1600]}')`;

        let counter = setInterval(() => {
            an += 2;
            yr.innerText = an;

            if (an >= tinte[i]) {
                an = tinte[i];
                yr.innerText = an;
                bg.style.backgroundImage = `url('${istorieVizuala[an]}')`;
                
                if (an === 2026) {
                    clearInterval(counter);
                    setTimeout(() => {
                        intro.style.opacity = '0';
                        setTimeout(() => intro.style.display = 'none', 1500);
                    }, 3000);
                }
                i++;
            }
        }, 40);
    }
</script>
</body>
</html>
