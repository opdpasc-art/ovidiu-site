<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dumitru-Ovidiu Pascu - Tezaur Străbun</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --rosu: #B30000; 
            --albastru: #002B7F; 
            --galben: #FCD116; 
            --negru: #1a1a1a;
        }
        
        body { 
            /* Fundal cu textura de hartie veche si poze de arhiva estompate */
            background: sepia(0.5) url('https://www.transparenttextures.com/patterns/old-map.png'), #f4e4bc;
            font-family: 'Times New Roman', Times, serif; 
            margin: 0; padding: 0; color: #2e1a05;
        }

        /* Bordura tip stergar/ie care inconjoara ecranul */
        .page-border {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 15px solid transparent;
            border-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSf_x-vD0mR-E6I-D4jY6XpD9H7Bf8fG2G3XQ&s') 30 repeat; /* Motiv popular */
            pointer-events: none;
            z-index: 10000;
        }

        header {
            text-align: center; 
            padding: 50px 20px;
            background: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            border-bottom: 5px double var(--rosu);
        }

        .titlu-vechi {
            font-size: 2.2rem;
            color: var(--rosu);
            text-transform: uppercase;
            margin: 0;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
            font-weight: 900;
        }

        .coloana {
            height: 40px;
            background: url('https://cdn-icons-png.flaticon.com/512/3858/3858631.png') center repeat-x;
            background-size: contain;
            margin: 15px 0;
        }

        /* MENIU TRADITIONAL JOS */
        nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: #fff; display: flex; justify-content: space-around;
            padding: 12px 0; border: 3px solid var(--rosu); z-index: 10001;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }

        nav button {
            background: none; border: none; color: var(--negru); 
            font-size: 0.75rem; font-weight: bold; text-transform: uppercase;
        }

        nav button i { display: block; font-size: 1.3rem; color: var(--rosu); margin-bottom: 4px; }
        nav button.active { color: var(--albastru); border-bottom: 2px solid var(--albastru); }

        /* SECTIUNI STIL HRISOV */
        .container { padding: 20px 30px 120px 30px; max-width: 800px; margin: 0 auto; position: relative; }
        
        .section { display: none; animation: fadeIn 0.6s; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hrisov {
            background: #fffaf0;
            padding: 30px;
            border: 1px solid #d2b48c;
            box-shadow: 0 0 15px rgba(0,0,0,0.1), inset 0 0 50px rgba(210,180,140,0.2);
            position: relative;
            margin-bottom: 30px;
        }

        .hrisov::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--albastru) 33.3%, var(--galben) 33.3%, var(--galben) 66.6%, var(--rosu) 66.6%);
        }

        h2 { font-family: 'Georgia', serif; color: var(--rosu); text-align: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; }

        .video-pancarta {
            border: 10px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
            position: relative;
            padding-bottom: 56.25%; height: 0;
        }
        .video-pancarta iframe { position: absolute; top:0; left:0; width:100%; height:100%; }

        .foto-tarani {
            width: 100%;
            height: 150px;
            background: url('https://culturaladuba.ro/wp-content/uploads/2020/06/61989674_2386903251368945_127083042079047680_o.jpg') center center no-repeat;
            background-size: cover;
            filter: grayscale(1) sepia(0.5);
            margin: 20px 0;
            border: 2px solid var(--rosu);
        }

        .btn-aur {
            display: block; background: var(--rosu); color: white !important;
            text-align: center; padding: 15px; text-decoration: none;
            font-weight: bold; margin-top: 20px; border: 2px solid var(--galben);
        }
    </style>
</head>
<body>

<div class="page-border"></div>

<header>
    <div class="titlu-vechi">Dumitru-Ovidiu Pascu</div>
    <div class="coloana"></div>
    <div style="font-weight: bold; letter-spacing: 5px; color: var(--albastru);">🇷🇴 ARHIVA DE FOLCLOR 🇷🇴</div>
</header>

<div class="container">
    
    <div id="acasa" class="section active">
        <div class="foto-tarani"></div>
        <div class="hrisov">
            <h2>Cuvânt de Bun Venit</h2>
            <p>Aici, la vatra cântecului străbun, timpul stă în loc. Am adunat piese de tezaur pentru a păstra vie flacăra identității noastre românești.</p>
            <p style="text-align: center; font-style: italic;">"Cine n-are dor pe lume, nu știe ce-i viața anume."</p>
        </div>
    </div>

    <div id="bio" class="section">
        <div class="hrisov">
            <h2>Din Neam în Neam</h2>
            <p>
