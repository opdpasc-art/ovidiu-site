<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dumitru-Ovidiu Pascu - România Autentică</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rosu-etno: #CC0000;
            --albastru-mandra: #002B7F;
            --galben-aur: #FCD116;
            --crem-panza: #FDFBF7;
        }

        body {
            background-color: var(--crem-panza);
            background-image: url('https://www.transparenttextures.com/patterns/natural-linen.png');
            font-family: 'Georgia', serif;
            margin: 0;
            color: #222;
        }

        .top-pattern {
            height: 15px;
            background-color: var(--rosu-etno);
            border-bottom: 4px solid var(--galben-aur);
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.6);
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--rosu-etno);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--albastru-mandra);
            margin-top: 10px;
            font-weight: bold;
        }

        .ornament {
            font-size: 1.5rem;
            color: var(--rosu-etno);
            margin: 15px 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Caseta textului tau */
        .about-box {
            background: white;
            padding: 25px;
            border: 2px solid #ddd;
            border-left: 5px solid var(--rosu-etno);
            border-right: 5px solid var(--albastru-mandra);
            margin-bottom: 40px;
            line-height: 1.8;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
